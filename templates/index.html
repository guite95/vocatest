<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 단어 퀴즈 마스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: opacity 0.2s, transform 0.2s; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 font-sans text-gray-800">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-xl overflow-hidden border border-gray-100">
        <div class="bg-blue-600 p-4 text-white flex justify-between items-center shadow-md">
            <h1 class="text-xl font-bold cursor-pointer hover:text-blue-100 transition" onclick="navigate('#/')">
                단어 퀴즈
            </h1>
            <div class="flex gap-2">
                <button onclick="navigate('#/admin')" class="text-sm bg-blue-700 bg-opacity-80 px-4 py-2 rounded-lg hover:bg-blue-800 transition shadow-sm font-medium">⚙️ 관리자</button>
            </div>
        </div>

        <div class="p-6 min-h-[500px]">
            
            <div id="view-home" class="space-y-6">
                <div class="flex items-end justify-between border-b pb-4">
                    <h2 class="text-2xl font-bold text-gray-800">도전할 퀴즈 선택</h2>
                    <span class="text-sm text-gray-500">생성된 문제지 목록입니다</span>
                </div>
                <div id="quiz-list" class="grid grid-cols-1 gap-4">
                    </div>
            </div>

            <div id="view-admin" class="hidden space-y-8 animate-fade-in">
                <div class="border-b pb-4">
                    <h2 class="text-2xl font-bold text-gray-800">관리자 기능</h2>
                    <p class="text-gray-500">새로운 단어장을 등록하거나 퀴즈를 생성하세요.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <button onclick="navigate('#/admin/add')" class="group bg-white border-2 border-indigo-100 hover:border-indigo-500 p-8 rounded-xl transition flex flex-col items-center justify-center space-y-4 shadow-sm hover:shadow-md">
                        <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center text-3xl group-hover:scale-110 transition">📚</div>
                        <div class="text-center">
                            <h3 class="font-bold text-lg text-gray-800">문제 범위 추가</h3>
                            <p class="text-sm text-gray-500">새로운 단어 목록 등록하기</p>
                        </div>
                    </button>
                    <button onclick="navigate('#/admin/create')" class="group bg-white border-2 border-green-100 hover:border-green-500 p-8 rounded-xl transition flex flex-col items-center justify-center space-y-4 shadow-sm hover:shadow-md">
                        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center text-3xl group-hover:scale-110 transition">📝</div>
                        <div class="text-center">
                            <h3 class="font-bold text-lg text-gray-800">새 퀴즈 만들기</h3>
                            <p class="text-sm text-gray-500">등록된 범위로 시험지 생성</p>
                        </div>
                    </button>
                </div>
                <div class="text-center pt-8">
                    <button onclick="navigate('#/')" class="text-gray-400 hover:text-gray-600 underline">← 메인으로 돌아가기</button>
                </div>
            </div>

            <div id="view-admin-range" class="hidden space-y-6">
                <div class="flex justify-between items-center border-b pb-4">
                    <h2 class="text-xl font-bold">새 문제 범위 등록</h2>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">범위 이름</label>
                        <input type="text" id="range-name" placeholder="예: Cambridge Test 1" class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">단어 목록 (붙여넣기)</label>
                        <textarea id="range-content" rows="12" placeholder="형식: 번호 영단어 뜻" class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-mono text-sm"></textarea>
                    </div>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="createWordRange()" class="flex-1 bg-indigo-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-indigo-700 transition">저장하기</button>
                    <button onclick="navigate('#/admin')" class="flex-1 bg-gray-200 text-gray-700 px-6 py-3 rounded-lg font-bold hover:bg-gray-300 transition">취소</button>
                </div>
            </div>

            <div id="view-admin-create-quiz" class="hidden space-y-6">
                <div class="border-b pb-4">
                    <h2 class="text-xl font-bold">퀴즈 생성 마법사</h2>
                    <p class="text-sm text-gray-500">어떤 범위에서 문제를 출제할까요?</p>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">퀴즈 제목</label>
                        <input type="text" id="quiz-title" placeholder="예: 1학기 중간고사 대비" class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">시험 공개 시간 (설정 안 하면 즉시 공개)</label>
                        <input type="datetime-local" id="quiz-available-from" class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-500 outline-none text-gray-600">
                        <p class="text-xs text-gray-400 mt-1">* 설정한 시간이 지나야 학생들이 문제를 볼 수 있습니다.</p>
                    </div>

                    <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                        <p class="text-sm font-bold text-gray-700 mb-3">출제 범위 선택 (다중 선택 가능)</p>
                        <div id="range-checkbox-list" class="space-y-2 max-h-40 overflow-y-auto pr-2 custom-scrollbar">
                            </div>
                    </div>
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="generateAndSaveQuiz()" id="btn-gen-quiz" class="flex-1 bg-green-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-green-700 transition shadow-lg shadow-green-200">
                        ✨ AI로 문제 생성
                    </button>
                    <button onclick="navigate('#/admin')" class="bg-gray-200 text-gray-700 px-6 py-3 rounded-lg font-bold hover:bg-gray-300 transition">취소</button>
                </div>
                
                <div id="gen-loading" class="hidden flex flex-col items-center justify-center py-8 space-y-3">
                    <div class="w-10 h-10 border-4 border-green-200 border-t-green-600 rounded-full animate-spin"></div>
                    <p class="text-green-700 font-medium animate-pulse">AI가 문제를 만들고 있습니다... (약 15초)</p>
                </div>
            </div>

            <div id="view-quiz-play" class="hidden space-y-6">
                <div class="flex justify-between items-end border-b pb-4">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800" id="play-title">시험</h2>
                        <span class="text-sm text-gray-500">총 40문항 / 빈칸을 채워주세요</span>
                    </div>
                    <div class="text-blue-600 font-bold bg-blue-50 px-3 py-1 rounded-full text-sm">진행 중</div>
                </div>
                <div id="quiz-container" class="space-y-6"></div>
                <div class="pt-6">
                    <button onclick="submitQuiz()" id="btn-submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-xl shadow-blue-200">
                        💯 다 풀었어요! (채점하기)
                    </button>
                </div>
                <div id="grading-loading" class="hidden flex flex-col items-center justify-center py-12 space-y-4">
                    <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
                    <p class="text-blue-700 font-bold text-lg">채점 중입니다...</p>
                </div>
            </div>

            <div id="view-result" class="hidden space-y-6">
                <div class="flex justify-between items-center bg-gray-50 p-6 rounded-xl border border-gray-200">
                    <h2 class="text-2xl font-bold text-gray-800">채점 결과</h2>
                    <div class="flex space-x-3">
                        <button onclick="downloadWrongAnswers()" class="bg-white border border-red-200 text-red-600 hover:bg-red-50 px-4 py-2 rounded-lg text-sm font-bold flex items-center shadow-sm">
                            💾 오답노트 저장
                        </button>
                        <button onclick="navigate('#/')" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-900 shadow-sm">
                            🏠 처음으로
                        </button>
                    </div>
                </div>
                <div class="overflow-hidden rounded-xl border border-gray-200 shadow-sm">
                    <table class="min-w-full text-sm divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left w-1/3">문제</th>
                                <th class="px-4 py-3 text-left w-1/3">내 답안</th>
                                <th class="px-4 py-3 text-left w-1/3">정답</th>
                                <th class="px-4 py-3 text-center w-12">결과</th>
                            </tr>
                        </thead>
                        <tbody id="result-table-body" class="bg-white divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="custom-modal-backdrop" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center backdrop-blur-sm transition-opacity duration-300">
        <div id="custom-modal-content" class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm mx-4 transform transition-all scale-95 opacity-0">
            <h3 id="modal-title" class="text-lg font-bold text-gray-900 mb-2">알림</h3>
            <p id="modal-message" class="text-gray-600 mb-6 leading-relaxed">내용</p>
            <input type="password" id="modal-input" class="w-full border border-gray-300 p-3 rounded-lg mb-6 hidden focus:ring-2 focus:ring-blue-500 outline-none" placeholder="입력하세요">
            <div class="flex gap-3 justify-end" id="modal-buttons"></div>
        </div>
    </div>

    <!-- 메인 로직 로드 -->
    <script src="/static/app.js"></script>
</body>
</html>
