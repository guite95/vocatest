name: Deploy to Oracle Cloud

on:
  push:
    branches: [ "main" ]

# 1. 권한 설정 추가 (필수!)
permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 이미지 이름을 소문자로 변환하는 단계 추가
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Lowercase image name
      run: |
        echo "IMAGE_NAME=ghcr.io/${{ github.repository }}/quiz-app" >> $GITHUB_ENV
        # 위 줄은 리포지토리 이름을 가져와서 IMAGE_NAME 환경변수로 만듭니다.
        # 도커는 대문자를 싫어하므로, 아래 단계에서 소문자로 변환된 값을 사용하게 됩니다.

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platform: linux/arm64
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/quiz-app:latest

    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.ORACLE_HOST }}
        username: ${{ secrets.ORACLE_USER }}
        key: ${{ secrets.ORACLE_KEY }}
        script: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # 여기도 소문자로 적어주세요
          docker pull ghcr.io/guite95/vocatest/quiz-app:latest
          
          docker stop quiz-app || true
          docker rm quiz-app || true
          
          docker run -d \
            --name quiz-app \
            --network voca-network \
            -p 8000:8000 \
            -v ~/quiz-data:/app/data \
            -e GENAI_API_KEY=${{ secrets.GENAI_API_KEY }} \
            -e ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }} \
            -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
            -e DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }} \
            -e DISCORD_CLIENT_SECRET=${{ secrets.DISCORD_CLIENT_SECRET }} \
            -e DISCORD_REDIRECT_URI=${{ secrets.DISCORD_REDIRECT_URI }} \
            --restart unless-stopped \
            ghcr.io/guite95/vocatest/quiz-app:latest