name: Deploy to Oracle Cloud

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set Image Name
      run: |
        REPO_NAME=$(echo "${{ github.repository }}/quiz-app" | tr '[:upper:]' '[:lower:]')
        echo "IMAGE_NAME=ghcr.io/${REPO_NAME}" >> $GITHUB_ENV

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/arm64
        push: true
        tags: ${{ env.IMAGE_NAME }}:latest

    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.ORACLE_HOST }}
        username: ${{ secrets.ORACLE_USER }}
        key: ${{ secrets.ORACLE_KEY }}
        envs: IMAGE_NAME
        script: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # 새 이미지를 가져옵니다.
          docker pull $IMAGE_NAME:latest
          
          docker stop quiz-app || true
          docker rm quiz-app || true
          
          docker run -d \
            --name quiz-app \
            --network voca-network \
            -p 8000:8000 \
            -v ~/quiz-data:/app/data \
            -e GENAI_API_KEY=${{ secrets.GENAI_API_KEY }} \
            -e ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }} \
            -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
            -e DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }} \
            -e DISCORD_CLIENT_SECRET=${{ secrets.DISCORD_CLIENT_SECRET }} \
            -e DISCORD_REDIRECT_URI=${{ secrets.DISCORD_REDIRECT_URI }} \
            --restart unless-stopped \
            $IMAGE_NAME:latest